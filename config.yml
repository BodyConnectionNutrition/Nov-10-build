For most of my career, I thought I was teaching nutrition.

Every day I met with people who wanted to know what to eat, how to lose weight, how to lower their cholesterol, how to improve their blood sugar, or how to feed their families. Those questions mattered, and they still do.

But over time I realized that very few of my patients were only struggling with food.

They were struggling with fear.

Fear that they were eating the wrong thing. Fear that their body was broken. Fear that they had somehow failed. Fear that the next article, podcast, influencer, or AI chatbot had discovered a truth they had somehow missed.

## The body is not separate from nature

The more I studied physiology, the less frightening the body became.

Our bodies are astonishingly adaptive. They are not separate from nature. They are nature.

Every breath is an exchange with the atmosphere.

Every meal is an exchange with the living world.

Every thought depends on molecules that were, only days before, sunlight captured by plants or nutrients carried through soil, water, and living organisms.

Metabolism is not merely chemistry.

It is relationship.

## From control to connection

When I began to see the body this way, something unexpected happened.

Nutrition became less about control.

It became more about connection.

Understanding that I am not separate from the natural world softened something in me. The body stopped feeling like an adversary to conquer and became something to listen to.

Hunger became information rather than failure.

Fatigue became communication rather than weakness.

Even illness became something to understand rather than simply fear.

## Compassion grows from understanding

When we recognize that we are embodied beings—formed by biology, shaped by experience, dependent upon one another, and inseparable from the world that sustains us—we become less inclined to judge ourselves and others.

Compassion grows naturally from understanding.

Fear thrives in separation.

Compassion grows in connection.

This website is about nutrition because food is one of the most intimate ways we experience that connection every day.

But my hope is that these conversations become about something larger than food.

Because I have come to believe that understanding our embodied place in the world invites less fear and more compassion.
